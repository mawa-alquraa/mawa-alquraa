<section class="writers-form-section">
  <div class="writers-card">
    <span class="writers-label">مساحة الكتابة</span>
    <h2>شارِكْ نَصَّكَ</h2>
    <p class="form-note">اكتب نصك هنا، وسيظهر مباشرة ضمن النصوص المنشورة باسمك المستعار أو ككاتب مجهول.</p>

    <form action="https://script.google.com/macros/s/AKfycbz_4dl74wwGJNg7Px55PQThcOVlphTNqeyLHWkUSCcijJsogxmTL6QuRQ0bZ3r3wue8/exec" method="POST" class="writers-form" id="writersForm">
      <input type="text" name="writer" placeholder="الاسم أو الاسم المستعار، اختياري">
      <input type="text" name="title" placeholder="عنوان النص" required>
      <select name="type" required>
        <option value="">اختاري نوع النص</option>
        <option value="خاطرة">خاطرة</option>
        <option value="شعر">شعر</option>
        <option value="قصة قصيرة">قصة قصيرة</option>
        <option value="رسالة">رسالة</option>
        <option value="اقتباس">اقتباس</option>
      </select>
      <textarea name="content" placeholder="اكتبي نصك هنا..." required></textarea>
      <button type="submit">نَشْر النَّص</button>
    </form>
  </div>
</section>

<section class="published-writings">
  <h2>النصوص المنشورة</h2>
  <p class="published-note">مساحة للكلمات التي اختارت أن تُقرأ.</p>
  <div class="writings-list" id="writingsList"></div>
</section>

<script>
  const writersForm = document.getElementById("writersForm");
  const scriptURL = "https://script.google.com/macros/s/AKfycbz_4dl74wwGJNg7Px55PQThcOVlphTNqeyLHWkUSCcijJsogxmTL6QuRQ0bZ3r3wue8/exec";

  writersForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    const data = new FormData(writersForm);
    try {
      await fetch(scriptURL, { method: "POST", body: data, mode: "no-cors" });
      writersForm.reset();
      alert("تم نشر النص بنجاح");
      setTimeout(loadWritings, 1000);
    } catch (error) {
      alert("صار خطأ، جرّبي مرة ثانية.");
    }
  });

  async function loadWritings() {
    try {
      const response = await fetch(scriptURL);
      const writings = await response.json();
      const writingsList = document.getElementById("writingsList");
      writingsList.innerHTML = "";
      writings.forEach(function (item) {
        const card = document.createElement("div");
        card.className = "writing-card";
        card.innerHTML = `
          <span class="writing-type">${item.type}</span>
          <h3>${item.title}</h3>
          <p>${item.content}</p>
          <small>بقلم: ${item.writer || "كاتب مجهول"}</small>
        `;
        writingsList.appendChild(card);
      });
    } catch (error) {
      console.error(error);
    }
  }

  loadWritings();
</script>
  <script>

</script>
